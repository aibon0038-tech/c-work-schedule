<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>株式会社C-WORK 現場スケジュール</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --muted: #6b7280;
      --line: #d9dee5;
      --paper: #ffffff;
      --panel: #ffffff;
      --nav: #050505;
      --nav-2: #16120a;
      --brand-gold: #d9b45b;
      --brand-gold-soft: #f1d991;
      --accent: #2f6f9f;
      --accent-2: #1f4f62;
      --danger: #bd4b42;
      --blue: #316f9d;
      --shadow: 0 14px 36px rgba(5, 5, 5, .16);
      --soft-shadow: 0 3px 16px rgba(5, 5, 5, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--ink);
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      padding-bottom: 86px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #050505;
      color: var(--brand-gold);
      padding: 16px 16px 14px;
      box-shadow: 0 6px 20px rgba(5, 5, 5, .22);
      border-bottom: 2px solid var(--brand-gold);
    }

    .topbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--brand-gold);
    }

    .date-pill {
      flex: 0 0 auto;
      padding: 7px 11px;
      border: 1px solid rgba(217, 180, 91, .45);
      border-radius: 8px;
      font-size: 12px;
      color: var(--brand-gold-soft);
      background: rgba(217, 180, 91, .1);
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .metric {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(255, 255, 255, .75);
      border-radius: 8px;
      padding: 12px 10px;
      min-height: 78px;
      box-shadow: var(--soft-shadow);
    }

    .metric b {
      display: block;
      font-size: 24px;
      line-height: 1.1;
      color: var(--nav);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 14px;
    }

    .search, .filter {
      min-height: 46px;
      border: 1px solid #d8dce1;
      background: #fff;
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(5, 5, 5, .02);
    }

    .search:focus, .filter:focus, input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(217, 180, 91, .22);
      border-color: var(--accent);
    }

    .filter {
      width: 116px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0 8px;
    }

    .section-title h2 {
      position: relative;
      margin: 0;
      padding-left: 12px;
      font-size: 17px;
      font-weight: 800;
      color: var(--nav);
    }

    .section-title h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 3px;
      bottom: 3px;
      width: 4px;
      border-radius: 999px;
      background: var(--accent);
    }

    .assignment-shell,
    .daily-check,
    .site-card,
    .timeline-shell {
      box-shadow: 0 2px 12px rgba(17, 24, 39, .06);
    }

    .section-title small {
      color: var(--muted);
      font-size: 12px;
    }

    .title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .export-btn {
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid #d8dce1;
      background: #1f2937;
      color: #eef6fb;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .assignment-shell {
      overflow-x: auto;
      border: 1px solid #d9dee5;
      background: rgba(255, 255, 255, .95);
      border-radius: 8px;
      margin-bottom: 14px;
      box-shadow: var(--soft-shadow);
    }

    .assignment-grid {
      --assignment-name-width: 98px;
      --assignment-day-width: 92px;
      width: max-content;
      min-width: calc(var(--assignment-name-width) + (var(--assignment-day-width) * 14));
      padding: 6px;
    }

    .assignment-row {
      display: grid;
      grid-template-columns: var(--assignment-name-width) repeat(14, var(--assignment-day-width));
      min-height: 60px;
      border-bottom: 1px solid #eceff2;
      align-items: stretch;
      font-size: 12px;
    }

    .assignment-row:last-child {
      border-bottom: 0;
    }

    .assignment-person,
    .assignment-date,
    .assignment-cell {
      padding: 8px;
      border-left: 1px solid #eceff2;
    }

    .assignment-person {
      position: sticky;
      left: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      border-left: 0;
      background: #f9fafb;
      color: #111827;
      font-weight: 800;
      box-shadow: none;
    }

    .assignment-date {
      min-height: 38px;
      background: #fafafa;
      color: #6b7280;
      font-weight: 800;
      text-align: center;
    }

    .assignment-date.today {
      color: var(--danger);
      background: #fff8e6;
    }

    .assignment-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }

    .assignment-site {
      display: block;
      border-radius: 6px;
      background: #eef6fb;
      color: #245f87;
      border: 1px solid #c9dfed;
      padding: 6px 7px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 750;
    }

    .day-toggle {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      min-height: 36px;
      border-radius: 6px;
      padding: 6px 7px;
      text-align: left;
      line-height: 1.25;
      font-size: 12px;
      font-weight: 700;
    }

    .day-toggle.empty {
      background: #f8fafc;
      color: #9aa3ad;
      border: 1px dashed #d8dce1;
    }

    .day-toggle.rest {
      background: #fff2d2;
      color: #835400;
      border: 1px solid #f0d596;
    }

    .assignment-note {
      color: var(--muted);
      font-size: 12px;
      margin: -3px 0 9px;
    }

    .daily-check {
      display: grid;
      gap: 10px;
      background: rgba(255, 255, 255, .96);
      border: 1px solid #d9dee5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      box-shadow: var(--soft-shadow);
    }

    .daily-check label {
      color: var(--muted);
      font-size: 12px;
    }

    .daily-list {
      display: grid;
      gap: 8px;
    }

    .daily-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px;
      align-items: start;
      border-top: 1px solid #eceff2;
      padding-top: 8px;
      font-size: 13px;
    }

    .daily-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .daily-person {
      color: var(--ink);
      font-weight: 800;
    }

    .daily-sites {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .daily-site {
      border-radius: 6px;
      background: #eef6fb;
      border: 1px solid #c9dfed;
      color: #245f87;
      padding: 5px 7px;
      line-height: 1.25;
    }

    .daily-muted {
      color: #9aa5ac;
      font-weight: 700;
    }

    .site-list {
      display: grid;
      gap: 12px;
    }

    .site-group {
      display: grid;
      gap: 10px;
    }

    .site-group + .site-group {
      margin-top: 14px;
    }

    .site-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .site-group-title span {
      flex: 0 0 auto;
      min-width: 28px;
      border-radius: 999px;
      background: #e9eef3;
      color: #273746;
      padding: 3px 8px;
      text-align: center;
      font-size: 12px;
    }

    .site-card {
      background: rgba(255, 255, 255, .96);
      border: 1px solid #d9dee5;
      border-radius: 8px;
      padding: 13px;
    }

    .site-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .site-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 800;
    }

    .site-address {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      flex: 0 0 auto;
      min-width: 58px;
      text-align: center;
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .status.normal { background: #e9eef3; color: #273746; }
    .status.warning { background: #fff2d2; color: #835400; }
    .status.late { background: #fae2df; color: #9b3027; }

    .progress-wrap {
      margin: 12px 0 10px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .bar {
      height: 9px;
      background: #eceff2;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value);
      background: linear-gradient(90deg, #111827, var(--accent));
    }

    .site-note {
      margin-top: 10px;
      padding: 10px 11px;
      border-top: 1px solid #eceff2;
      background: #fafafa;
      border-radius: 8px;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .site-note b {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .timeline-shell {
      overflow-x: auto;
      border: 1px solid #d9dee5;
      background: rgba(255, 255, 255, .96);
      border-radius: 8px;
      box-shadow: var(--soft-shadow);
    }

    .timeline {
      min-width: 1560px;
      padding: 10px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 130px repeat(30, 1fr);
      min-height: 38px;
      border-bottom: 1px solid #eceff2;
      align-items: center;
      font-size: 12px;
    }

    .timeline-row:last-child {
      border-bottom: 0;
    }

    .timeline-label {
      color: var(--muted);
      padding-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-cell {
      height: 22px;
      border-left: 1px solid #eceff2;
      position: relative;
    }

    .timeline-cell.active::after {
      content: "";
      position: absolute;
      inset: 3px 2px;
      background: linear-gradient(90deg, #111827, var(--accent));
      border-radius: 5px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .18);
    }

    .timeline-cell.today::before {
      content: "";
      position: absolute;
      inset: -8px auto -8px 50%;
      width: 2px;
      background: var(--danger);
      opacity: .75;
      z-index: 1;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 10;
      background: #fff;
      border-radius: 14px 14px 0 0;
      box-shadow: var(--shadow);
      transform: translateY(105%);
      transition: transform .22s ease;
      max-height: 88vh;
      overflow: auto;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 16px;
    }

    .sheet h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    label.full {
      grid-column: 1 / -1;
    }

    fieldset {
      display: grid;
      gap: 6px;
      margin: 0;
      border: 0;
      padding: 0;
    }

    legend {
      color: var(--muted);
      font-size: 12px;
      padding: 0;
    }

    input, select, textarea {
      min-height: 42px;
      border: 1px solid #d8dce1;
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    .staff-checks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .staff-option {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      border: 1px solid #d8dce1;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
    }

    .staff-option input {
      width: 18px;
      height: 18px;
      min-height: 0;
      padding: 0;
      accent-color: var(--accent);
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary, .secondary, .fab, .icon-btn {
      min-height: 44px;
      border-radius: 8px;
      font-weight: 750;
    }

    .primary {
      background: linear-gradient(135deg, var(--nav), var(--nav-2));
      color: #fff;
    }

    .secondary {
      background: #f7f7f7;
      color: var(--ink);
    }

    .fab {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 6;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1f4f62, #2f6f9f);
      color: #ffffff;
      box-shadow: var(--shadow);
      font-size: 30px;
      line-height: 1;
    }

    .icon-btn {
      width: 42px;
      background: #f7f7f7;
      color: var(--ink);
      font-size: 18px;
      border: 1px solid #d8dce1;
    }

    .empty {
      border: 1px dashed #d8dce1;
      border-radius: 8px;
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }

    @media (max-width: 560px) {
      main { padding: 10px; }
      .summary { grid-template-columns: repeat(3, 1fr); }
      .metric { padding: 9px 8px; min-height: 68px; }
      .metric b { font-size: 20px; }
      .controls { grid-template-columns: 1fr; }
      .filter { width: 100%; }
      .form-grid { grid-template-columns: 1fr; }
      .sheet-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-row">
        <h1>株式会社C-WORK　現場スケジュール</h1>
        <div class="date-pill" id="todayLabel"></div>
      </div>
    </header>

    <main>
      <div class="section-title">
        <h2>予定表</h2>
        <div class="title-actions">
          <small>横に動かせます</small>
          <button class="export-btn" id="exportScheduleButton" type="button">7日分を画像保存</button>
        </div>
      </div>
      <p class="assignment-note">未入力のマスをタップすると休みに切り替わります</p>
      <section class="assignment-shell" aria-label="担当者別の予定表">
        <div class="assignment-grid" id="assignmentGrid"></div>
      </section>

      <section class="controls" aria-label="検索と絞り込み">
        <input class="search" id="searchInput" type="search" placeholder="現場名・担当者で検索">
        <select class="filter" id="personFilter">
          <option value="all">全員</option>
        </select>
        <select class="filter" id="statusFilter">
          <option value="all">すべて</option>
          <option value="normal">順調</option>
          <option value="warning">注意</option>
          <option value="late">遅れ</option>
        </select>
      </section>

      <div class="section-title">
        <h2>現場一覧</h2>
        <small>カードを押すと編集</small>
      </div>
      <section class="site-list" id="siteList"></section>

      <div class="section-title">
        <h2>1ヵ月スケジュール</h2>
        <small>横に動かせます</small>
      </div>
      <section class="timeline-shell" aria-label="1ヵ月スケジュール">
        <div class="timeline" id="timeline"></div>
      </section>

      <div class="section-title">
        <h2>日付別 確認</h2>
        <small>誰がどこへ行ったか</small>
      </div>
      <section class="daily-check" aria-label="日付別の現場確認">
        <label>確認する日付
          <input id="dailyDateInput" type="date">
        </label>
        <div class="daily-list" id="dailySummary"></div>
      </section>
    </main>

    <button class="fab" id="addButton" aria-label="現場を追加">+</button>
  </div>

  <section class="sheet" id="editor" aria-label="現場入力">
    <form class="sheet-inner" id="siteForm">
      <h2 id="sheetTitle">現場を追加</h2>
      <div class="form-grid">
        <label class="full">現場名
          <input id="nameInput" required placeholder="例：青葉町 戸建て改修">
        </label>
        <label class="full">住所・メモ
          <input id="addressInput" placeholder="例：横浜市青葉区 / 搬入は午前">
        </label>
        <label>開始日
          <input id="startInput" type="date" required>
        </label>
        <label>終了日
          <input id="endInput" type="date" required>
        </label>
        <fieldset>
          <legend>担当者</legend>
          <div class="staff-checks" id="personInput"></div>
        </fieldset>
        <label>状態
          <select id="statusInput">
            <option value="normal">順調</option>
            <option value="warning">注意</option>
            <option value="late">遅れ</option>
          </select>
        </label>
        <label class="full">備考
          <textarea id="tasksInput" placeholder="例：搬入は午前中。材料が届き次第スタート。"></textarea>
        </label>
      </div>
      <div class="sheet-actions">
        <button class="primary" type="submit">保存</button>
        <button class="secondary" type="button" id="closeButton">閉じる</button>
      </div>
    </form>
  </section>

  <script>
    const storageKey = "field-schedule-v2";
    const restStorageKey = "field-schedule-rest-days-v1";
    const staff = ["りょうた", "だいき", "げるくん", "ひろえさん"];
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const seedSites = [
      {
        id: makeId(),
        name: "青葉町 戸建て改修",
        address: "横浜市青葉区 / 午前搬入",
        start: toInputDate(addDays(today, -2)),
        end: toInputDate(addDays(today, 5)),
        persons: ["りょうた", "だいき"],
        status: "normal",
        tasks: "搬入は午前中。近隣への声かけ済み。"
      },
      {
        id: makeId(),
        name: "駅前テナント 原状回復",
        address: "川崎駅前 / 夜間作業あり",
        start: toInputDate(addDays(today, -5)),
        end: toInputDate(today),
        persons: ["だいき", "げるくん"],
        status: "warning",
        tasks: "夜間作業あり。管理会社へ事前連絡。"
      },
      {
        id: makeId(),
        name: "南町 マンション共用部",
        address: "南町3丁目 / 管理人連絡済み",
        start: toInputDate(addDays(today, 1)),
        end: toInputDate(addDays(today, 10)),
        persons: ["ひろえさん"],
        status: "normal",
        tasks: "共用部のため通行導線を確保。"
      }
    ];

    let sites = JSON.parse(localStorage.getItem(storageKey) || "null") || seedSites;
    let restDays = JSON.parse(localStorage.getItem(restStorageKey) || "{}");
    let editingId = null;

    const els = {
      todayLabel: document.getElementById("todayLabel"),
      searchInput: document.getElementById("searchInput"),
      personFilter: document.getElementById("personFilter"),
      statusFilter: document.getElementById("statusFilter"),
      assignmentGrid: document.getElementById("assignmentGrid"),
      dailyDateInput: document.getElementById("dailyDateInput"),
      dailySummary: document.getElementById("dailySummary"),
      siteList: document.getElementById("siteList"),
      timeline: document.getElementById("timeline"),
      editor: document.getElementById("editor"),
      siteForm: document.getElementById("siteForm"),
      sheetTitle: document.getElementById("sheetTitle"),
      addButton: document.getElementById("addButton"),
      exportScheduleButton: document.getElementById("exportScheduleButton"),
      closeButton: document.getElementById("closeButton"),
      nameInput: document.getElementById("nameInput"),
      addressInput: document.getElementById("addressInput"),
      startInput: document.getElementById("startInput"),
      endInput: document.getElementById("endInput"),
      personInput: document.getElementById("personInput"),
      statusInput: document.getElementById("statusInput"),
      tasksInput: document.getElementById("tasksInput")
    };

    els.personFilter.innerHTML += staff.map(name => `<option value="${name}">${name}</option>`).join("");
    els.personInput.innerHTML = staff.map(name => `
      <label class="staff-option">
        <input type="checkbox" value="${name}">
        <span>${name}</span>
      </label>
    `).join("");

    els.todayLabel.textContent = new Intl.DateTimeFormat("ja-JP", {
      month: "numeric",
      day: "numeric",
      weekday: "short"
    }).format(today);
    els.dailyDateInput.value = toInputDate(today);

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function makeId() {
      if (window.crypto?.randomUUID) {
        return crypto.randomUUID();
      }
      return `site-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function toInputDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseDate(value) {
      const date = new Date(value + "T00:00:00");
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function save() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(sites));
      } catch (error) {
        alert("保存できませんでした。ブラウザの保存容量やプライベートモードを確認してください。");
        throw error;
      }
    }

    function saveRestDays() {
      try {
        localStorage.setItem(restStorageKey, JSON.stringify(restDays));
      } catch (error) {
        alert("休み設定を保存できませんでした。ブラウザの保存容量やプライベートモードを確認してください。");
        throw error;
      }
    }

    function getVisibleSites() {
      const term = els.searchInput.value.trim().toLowerCase();
      const person = els.personFilter.value;
      const status = els.statusFilter.value;
      return sites.filter(site => {
        const persons = getSitePersons(site);
        const personText = persons.length ? persons.join(" ") : "担当未定";
        const matchesText = `${site.name} ${personText} ${site.address}`.toLowerCase().includes(term);
        const matchesPerson = person === "all" || persons.includes(person);
        const matchesStatus = status === "all" || site.status === status;
        return matchesText && matchesPerson && matchesStatus;
      });
    }

    function progressFor(site) {
      const start = parseDate(site.start);
      const end = getSiteEndDate(site);
      const totalDays = getSiteDays(site);
      const elapsed = Math.floor((today - start) / 86400000) + 1;
      return Math.max(0, Math.min(100, Math.round((elapsed / totalDays) * 100)));
    }

    function isActive(site) {
      const start = parseDate(site.start);
      const end = getSiteEndDate(site);
      return today >= start && today <= end;
    }

    function isCompleted(site) {
      return getSiteEndDate(site) < today;
    }

    function statusLabel(value) {
      return { normal: "順調", warning: "注意", late: "遅れ" }[value] || "順調";
    }

    function render() {
      const visibleSites = getVisibleSites();
      els.assignmentGrid.innerHTML = renderAssignmentGrid();
      els.dailySummary.innerHTML = renderDailySummary(els.dailyDateInput.value);

      els.siteList.innerHTML = renderSiteGroups(visibleSites);

      els.timeline.innerHTML = renderTimeline(visibleSites);

      document.querySelectorAll("[data-edit]").forEach(button => {
        button.addEventListener("click", () => openEditor(button.dataset.edit));
      });
      document.querySelectorAll("[data-rest-person]").forEach(button => {
        button.addEventListener("click", () => toggleRestDay(button.dataset.restPerson, button.dataset.restDate));
      });
    }

    function renderSiteGroups(items) {
      if (!items.length) {
        return `<div class="empty">表示できる現場がありません</div>`;
      }
      const activeItems = items.filter(site => !isCompleted(site));
      const completed = items.filter(isCompleted);
      const undecided = activeItems.filter(site => getSitePersons(site).length === 0);
      const decided = activeItems.filter(site => getSitePersons(site).length > 0);
      return [
        renderSiteGroup("担当者未定", undecided),
        renderSiteGroup("担当者決定済み", decided),
        renderSiteGroup("終了済み", completed)
      ].filter(Boolean).join("");
    }

    function renderSiteGroup(title, items) {
      if (!items.length) {
        return "";
      }
      return `
        <section class="site-group" aria-label="${escapeAttr(title)}">
          <div class="site-group-title">${escapeHtml(title)}<span>${items.length}</span></div>
          ${items.map(renderSite).join("")}
        </section>
      `;
    }

    function renderSite(site) {
      const progress = progressFor(site);
      const persons = getSitePersons(site);
      const end = getSiteEndDate(site);
      const note = String(site.tasks || "").trim();
      return `
        <article class="site-card">
          <div class="site-head">
            <button class="icon-btn" data-edit="${site.id}" aria-label="編集">✎</button>
            <div style="flex:1;min-width:0">
              <h3 class="site-name">${escapeHtml(site.name)}</h3>
              <p class="site-address">${escapeHtml(site.address || "住所・メモ未入力")}</p>
            </div>
            <div class="status ${site.status}">${statusLabel(site.status)}</div>
          </div>
          <div class="progress-wrap">
            <div class="progress-meta">
              <span>${formatShort(site.start)}〜${formatShort(toInputDate(end))} / ${getSiteDays(site)}日</span>
              <span>担当 ${escapeHtml(persons.length ? persons.join("、") : "未定")}</span>
            </div>
            <div class="bar" style="--value:${progress}%"><span></span></div>
          </div>
          ${note ? `<div class="site-note"><b>備考</b>${escapeHtml(note)}</div>` : ""}
        </article>
      `;
    }

    function renderAssignmentGrid() {
      const days = Array.from({ length: 14 }, (_, index) => addDays(today, index));
      const header = `
        <div class="assignment-row">
          <div class="assignment-person">担当者</div>
          ${days.map((day, index) => `
            <div class="assignment-date ${index === 0 ? "today" : ""}">
              ${formatShort(toInputDate(day))}
            </div>
          `).join("")}
        </div>
      `;
      const rows = staff.map(person => `
        <div class="assignment-row">
          <div class="assignment-person">${escapeHtml(person)}</div>
          ${days.map(day => renderAssignmentCell(person, day)).join("")}
        </div>
      `).join("");
      return header + rows;
    }

    function renderAssignmentCell(person, day) {
      const names = new Set();
      const dateValue = toInputDate(day);
      sites.forEach(site => {
        const start = parseDate(site.start);
        const end = getSiteEndDate(site);
        if (getSitePersons(site).includes(person) && day >= start && day <= end) {
          names.add(site.name);
        }
      });
      const isRest = restDays[person]?.includes(dateValue);
      const content = names.size
        ? Array.from(names).map(name => `<span class="assignment-site">${escapeHtml(name)}</span>`).join("")
        : `<button class="day-toggle ${isRest ? "rest" : "empty"}" type="button" data-rest-person="${escapeAttr(person)}" data-rest-date="${dateValue}">${isRest ? "休み" : "未入力"}</button>`;
      return `<div class="assignment-cell">${content}</div>`;
    }

    function getSitesForPersonOnDate(person, day) {
      return sites
        .filter(site => {
          const start = parseDate(site.start);
          const end = getSiteEndDate(site);
          return getSitePersons(site).includes(person) && day >= start && day <= end;
        })
        .map(site => site.name);
    }

    function exportAssignmentImage() {
      const days = Array.from({ length: 7 }, (_, index) => addDays(today, index));
      const cellWidth = 180;
      const nameWidth = 130;
      const rowHeight = 86;
      const headerHeight = 72;
      const titleHeight = 68;
      const padding = 28;
      const width = padding * 2 + nameWidth + cellWidth * days.length;
      const height = padding * 2 + titleHeight + headerHeight + rowHeight * staff.length;
      const canvas = document.createElement("canvas");
      const scale = 2;
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, width, titleHeight + padding);
      ctx.fillStyle = "#d9b45b";
      ctx.font = "800 28px system-ui, sans-serif";
      ctx.fillText("株式会社C-WORK 現場スケジュール", padding, 44);
      ctx.fillStyle = "#f1d991";
      ctx.font = "600 14px system-ui, sans-serif";
      ctx.fillText(`${formatShort(toInputDate(days[0]))}〜${formatShort(toInputDate(days.at(-1)))} 共有用`, padding, 68);

      const startX = padding;
      const startY = padding + titleHeight;
      drawCell(ctx, startX, startY, nameWidth, headerHeight, "担当者", "#f7f7f7", "#202124", true);
      days.forEach((day, index) => {
        const label = new Intl.DateTimeFormat("ja-JP", { month: "numeric", day: "numeric", weekday: "short" }).format(day);
        drawCell(ctx, startX + nameWidth + cellWidth * index, startY, cellWidth, headerHeight, label, "#eef3f7", "#273746", true);
      });

      staff.forEach((person, rowIndex) => {
        const y = startY + headerHeight + rowHeight * rowIndex;
        drawCell(ctx, startX, y, nameWidth, rowHeight, person, "#f9fafb", "#111827", true);
        days.forEach((day, dayIndex) => {
          const x = startX + nameWidth + cellWidth * dayIndex;
          const names = getSitesForPersonOnDate(person, day);
          const isRest = restDays[person]?.includes(toInputDate(day));
          const text = names.length ? names.join(" / ") : (isRest ? "休み" : "未入力");
          drawCell(ctx, x, y, cellWidth, rowHeight, text, names.length ? "#eef6fb" : "#ffffff", names.length ? "#245f87" : "#6b7280", false);
        });
      });

      const link = document.createElement("a");
      link.download = `C-WORK_7日予定表_${toInputDate(today)}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function drawCell(ctx, x, y, width, height, text, bg, color, bold) {
      ctx.fillStyle = bg;
      ctx.fillRect(x, y, width, height);
      ctx.strokeStyle = "#d9dee5";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, width, height);
      ctx.fillStyle = color;
      ctx.font = `${bold ? "800" : "600"} 15px system-ui, sans-serif`;
      wrapCanvasText(ctx, text, x + 10, y + 26, width - 20, 19, Math.floor((height - 16) / 19));
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const chars = String(text || "").split("");
      const lines = [];
      let line = "";
      chars.forEach(char => {
        const test = line + char;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = char;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      lines.slice(0, maxLines).forEach((value, index) => {
        const suffix = index === maxLines - 1 && lines.length > maxLines ? "…" : "";
        ctx.fillText(value + suffix, x, y + lineHeight * index);
      });
    }

    function renderDailySummary(value) {
      const day = parseDate(value || toInputDate(today));
      const rows = staff.map(person => renderDailyRow(person, day)).join("");
      const undecided = sites.filter(site => {
        const start = parseDate(site.start);
        const end = getSiteEndDate(site);
        return getSitePersons(site).length === 0 && day >= start && day <= end;
      });
      const undecidedRow = undecided.length
        ? renderDailyRow("担当未定", day, undecided.map(site => site.name))
        : "";
      return rows + undecidedRow;
    }

    function renderDailyRow(person, day, forcedNames) {
      const dateValue = toInputDate(day);
      const names = forcedNames || sites
        .filter(site => {
          const start = parseDate(site.start);
          const end = getSiteEndDate(site);
          return getSitePersons(site).includes(person) && day >= start && day <= end;
        })
        .map(site => site.name);
      const isRest = restDays[person]?.includes(dateValue);
      const content = names.length
        ? names.map(name => `<span class="daily-site">${escapeHtml(name)}</span>`).join("")
        : `<span class="daily-muted">${isRest ? "休み" : "予定なし"}</span>`;
      return `
        <div class="daily-row">
          <div class="daily-person">${escapeHtml(person)}</div>
          <div class="daily-sites">${content}</div>
        </div>
      `;
    }

    function renderTimeline(items) {
      const days = Array.from({ length: 30 }, (_, index) => addDays(today, index));
      const header = `
        <div class="timeline-row">
          <div class="timeline-label">現場</div>
          ${days.map(day => `<div class="timeline-cell">${formatShort(toInputDate(day))}</div>`).join("")}
        </div>
      `;
      const rows = items.map(site => {
        const start = parseDate(site.start);
        const end = getSiteEndDate(site);
        return `
          <div class="timeline-row">
            <div class="timeline-label">${escapeHtml(site.name)}</div>
            ${days.map((day, index) => {
              const active = day >= start && day <= end;
              return `<div class="timeline-cell ${active ? "active" : ""} ${index === 0 ? "today" : ""}"></div>`;
            }).join("")}
          </div>
        `;
      }).join("");
      return header + rows;
    }

    function formatShort(value) {
      const date = parseDate(value);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function getSiteEndDate(site) {
      if (site.end) {
        return parseDate(site.end);
      }
      return addDays(parseDate(site.start), Number(site.days || 1) - 1);
    }

    function getSiteDays(site) {
      const start = parseDate(site.start);
      const end = getSiteEndDate(site);
      return Math.max(1, Math.floor((end - start) / 86400000) + 1);
    }

    function getSitePersons(site) {
      if (Array.isArray(site.persons) && site.persons.length) {
        return site.persons;
      }
      return site.person ? [site.person] : [];
    }

    function getCheckedPersons() {
      return Array.from(els.personInput.querySelectorAll("input:checked")).map(input => input.value);
    }

    function setCheckedPersons(persons) {
      const selected = persons.length ? persons : [];
      els.personInput.querySelectorAll("input").forEach(input => {
        input.checked = selected.includes(input.value);
      });
    }

    function toggleRestDay(person, dateValue) {
      restDays[person] = restDays[person] || [];
      restDays[person] = restDays[person].includes(dateValue)
        ? restDays[person].filter(value => value !== dateValue)
        : [...restDays[person], dateValue].sort();
      saveRestDays();
      render();
    }

    function openEditor(id) {
      editingId = id || null;
      const site = sites.find(item => item.id === id);
      els.sheetTitle.textContent = site ? "現場を編集" : "現場を追加";
      els.nameInput.value = site?.name || "";
      els.addressInput.value = site?.address || "";
      els.startInput.value = site?.start || toInputDate(today);
      els.endInput.value = site ? toInputDate(getSiteEndDate(site)) : toInputDate(addDays(today, 6));
      setCheckedPersons(site ? getSitePersons(site) : []);
      els.statusInput.value = site?.status || "normal";
      els.tasksInput.value = site?.tasks || "";
      els.editor.classList.add("open");
      els.nameInput.focus();
    }

    function closeEditor() {
      els.editor.classList.remove("open");
      editingId = null;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    els.addButton.addEventListener("click", () => openEditor());
    els.exportScheduleButton.addEventListener("click", exportAssignmentImage);
    els.closeButton.addEventListener("click", closeEditor);
    els.searchInput.addEventListener("input", render);
    els.personFilter.addEventListener("change", render);
    els.statusFilter.addEventListener("change", render);
    els.dailyDateInput.addEventListener("change", render);
    els.siteForm.addEventListener("submit", event => {
      event.preventDefault();
      const persons = getCheckedPersons();
      const startDate = parseDate(els.startInput.value);
      const endDate = parseDate(els.endInput.value);
      if (endDate < startDate) {
        alert("終了日は開始日以降を選択してください");
        return;
      }
      const payload = {
        id: editingId || makeId(),
        name: els.nameInput.value.trim(),
        address: els.addressInput.value.trim(),
        start: els.startInput.value,
        end: els.endInput.value,
        days: Math.floor((endDate - startDate) / 86400000) + 1,
        person: persons[0] || "",
        persons,
        status: els.statusInput.value,
        tasks: els.tasksInput.value.trim()
      };
      sites = editingId
        ? sites.map(site => site.id === editingId ? payload : site)
        : [payload, ...sites];
      save();
      closeEditor();
      render();
    });

    render();
  </script>
</body>
</html>
